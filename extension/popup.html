<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #202124;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      font-weight: 600;
    }
    .status {
      padding: 10px 12px;
      border-radius: 4px;
      background: #e8f0fe;
      color: #1967d2;
      font-size: 13px;
      line-height: 1.5;
    }
    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #5f6368;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h2>Influence Outreach</h2>
  <div class="status" id="status">Extension active.</div>
  <p class="hint" id="hint">Open the Outreach dashboard and click &ldquo;Scrape Via Extension&rdquo; to scrape Instagram profiles.</p>
  <script src="popup.js"></script>
</body>
</html>
